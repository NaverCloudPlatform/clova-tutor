        - name: status
          in: query
          required: false
          schema:
            type: array
            items:
              $ref: '#/components/schemas/ProblemStatus'
            default: []
            title: Status
        - name: cursor
          in: query
          required: false
          schema:
            anyOf:
              - type: string
              - type: 'null'
            title: Cursor
        - name: size
          in: query
          required: false
          schema:
            type: integer
            maximum: 100
            minimum: 1
            default: 10
            title: Size
