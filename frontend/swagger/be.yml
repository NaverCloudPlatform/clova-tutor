openapi: 3.1.0
info:
  title: edu-max BE
  version: 0.0.1
paths:
  /chats:
    get:
      tags:
        - chats
      summary: Get Chats
      description: 모든 채팅 목록을 반환합니다.
      operationId: get_chats_chats_get
      parameters:
        - name: subject
          in: query
          required: false
          schema:
            anyOf:
              - type: array
                items:
                  $ref: '#/components/schemas/SubjectEnum'
              - type: 'null'
            title: Subject
        - name: cursor
          in: query
          required: false
          schema:
            anyOf:
              - type: string
              - type: 'null'
            title: Cursor
        - name: size
          in: query
          required: false
          schema:
            type: integer
            maximum: 100
            minimum: 1
            default: 10
            title: Size
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CursorPaginateResponse_ChatResponse_'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    post:
      tags:
        - chats
      summary: Create Chat
      description: 새로운 채팅을 생성합니다.
      operationId: create_chat_chats_post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatCreateRequestBody'
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /chats/{chat_id}:
    get:
      tags:
        - chats
      summary: Get Chat
      description: 특정 채팅의 정보를 반환합니다.
      operationId: get_chat_chats__chat_id__get
      parameters:
        - name: chat_id
          in: path
          required: true
          schema:
            type: integer
            title: Chat Id
      x-staleTime: Infinity
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatDetailResponse'
        '404':
          description: 해당 채팅이 존재하지 않을 경우 반환됩니다.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    patch:
      tags:
        - chats
      summary: Update Chat Title
      description: 특정 채팅의 제목을 수정합니다.
      operationId: update_chat_title_chats__chat_id__patch
      parameters:
        - name: chat_id
          in: path
          required: true
          schema:
            type: integer
            title: Chat Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatTitleUpdateRequestBody'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatResponse'
        '404':
          description: 해당 채팅이 존재하지 않을 경우 반환됩니다.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
        - chats
      summary: Delete Chat
      description: 특정 채팅을 삭제합니다.
      operationId: delete_chat_chats__chat_id__delete
      parameters:
        - name: chat_id
          in: path
          required: true
          schema:
            type: integer
            title: Chat Id
      responses:
        '204':
          description: Successful Response
        '404':
          description: 해당 채팅이 존재하지 않을 경우 반환됩니다.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /chats/{chat_id}/stream-status:
    get:
      tags:
        - chats
      summary: Get Chat Stream Status
      description: 현재 채팅방의 스트림 상태를 확인합니다.
      operationId: get_chat_stream_status_chats__chat_id__stream_status_get
      parameters:
        - name: chat_id
          in: path
          required: true
          schema:
            type: integer
            title: Chat Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatStreamStatusResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /chats/{chat_id}/resume:
    post:
      tags:
        - chats
      summary: Resume Chat Stream
      description: 중단된 채팅 스트림을 재개합니다.
      operationId: resume_chat_stream_chats__chat_id__resume_post
      parameters:
        - name: chat_id
          in: path
          required: true
          schema:
            type: integer
            title: Chat Id
      responses:
        '200':
          description: SSE 이벤트 메시지 스트림
          content:
            text/event-stream:
              schema:
                type: string
                example: |
                  event: message_start
                  data: {
                    "id": -1,
                    "chat_id": 1,
                    "created_at": "현재시간",
                    "type": "message",
                    "author": {
                      "role": "assistant",
                      "user_id": -1
                    },
                    "content": {
                      "m_type": "text",
                      "value": {
                        "text": ""
                      }
                    }
                  }

                  event: message_delta
                  data: {"text": "string"}

                  event: message_end
        '404':
          description: 해당 채팅이 존재하지 않을 경우 반환됩니다.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /chats/{chat_id}/stop-conversation:
    post:
      tags:
        - chats
      summary: Stop Stream
      description: 현재 스트리밍 중인 대화를 중지합니다.
      operationId: stop_stream_chats__chat_id__stop_conversation_post
      parameters:
        - name: chat_id
          in: path
          required: true
          schema:
            type: integer
            title: Chat Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatMessageStopResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /chats/{chat_id}/messages:
    get:
      tags:
        - chats
      summary: Get Messages
      description: 특정 채팅의 메시지 목록을 반환합니다.
      operationId: get_messages_chats__chat_id__messages_get
      parameters:
        - name: chat_id
          in: path
          required: true
          schema:
            type: integer
            title: Chat Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageListResponse'
        '404':
          description: 해당 채팅이 존재하지 않을 경우 반환됩니다.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    post:
      tags:
        - chats
      summary: Send Message
      description: 특정 채팅에 메세지를 전송합니다.
      operationId: send_message_chats__chat_id__messages_post
      parameters:
        - name: chat_id
          in: path
          required: true
          schema:
            type: integer
            title: Chat Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatMessageCreateRequestBody'
      responses:
        '200':
          description: SSE 이벤트 메시지 스트림
          content:
            text/event-stream:
              schema:
                type: string
                example: |
                  event: message_start
                  data: {
                    "id": -1,
                    "chat_id": 1,
                    "created_at": "현재시간",
                    "type": "message",
                    "author": {
                      "role": "assistant",
                      "user_id": -1
                    },
                    "content": {
                      "m_type": "text",
                      "value": {
                        "text": ""
                      }
                    }
                  }

                  event: message_delta
                  data: {"text": "string"}

                  event: message_end
        '404':
          description: 해당 채팅이 존재하지 않을 경우 반환됩니다.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /chats/{chat_id}/problems:
    get:
      tags:
        - chats
      summary: Get Chat Problems
      description: |-
        특정 채팅의 문제 목록을 조회합니다.

        Args:
            service (ChatProblemService): 채팅 문제 서비스 객체

        Returns:
            List[ChatProblemResponse]: 채팅 문제 목록

        Raises:
            ChatNotFoundException: 채팅을 찾을 수 없는 경우
      operationId: get_chat_problems_chats__chat_id__problems_get
      parameters:
        - name: chat_id
          in: path
          required: true
          schema:
            type: integer
            title: Chat Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ChatProblemResponse'
                title: Response Get Chat Problems Chats  Chat Id  Problems Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /chats/{chat_id}/problems/{problem_id}:
    get:
      tags:
        - chats
      summary: Get Chat Problem
      description: |-
        특정 채팅의 특정 문제 상세 정보를 조회합니다.

        Args:
            service (ChatProblemService): 채팅 문제 서비스 객체
            problem_id (int): 문제 ID

        Returns:
            ChatProblemDetailResponse: 문제 상세 정보

        Raises:
            ChatNotFoundException: 채팅을 찾을 수 없는 경우
            ChatProblemNotFoundException: 문제를 찾을 수 없는 경우
      operationId: get_chat_problem_chats__chat_id__problems__problem_id__get
      parameters:
        - name: chat_id
          in: path
          required: true
          schema:
            type: integer
            title: Chat Id
        - name: problem_id
          in: path
          required: true
          schema:
            type: string
            title: Problem Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatProblemDetailResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /chats/{chat_id}/problems/{problem_id}/submit:
    post:
      tags:
        - chats
      summary: Submit Chat Problem
      description: |-
        특정 채팅의 특정 문제에 대한 답안을 제출합니다.

        Args:
            problem_id (int): 문제 ID
            submit (ChatProblemSubmitRequest): 답안 제출 요청 데이터
            service (ChatProblemService): 채팅 문제 서비스 객체

        Returns:
            ChatProblemSubmitResponse: 답안 제출 결과

        Raises:
            ChatNotFoundException: 채팅을 찾을 수 없는 경우
            ChatProblemNotFoundException: 문제를 찾을 수 없는 경우
            AlreadySolvedException: 이미 해결된 문제인 경우
      operationId: submit_chat_problem_chats__chat_id__problems__problem_id__submit_post
      parameters:
        - name: chat_id
          in: path
          required: true
          schema:
            type: integer
            title: Chat Id
        - name: problem_id
          in: path
          required: true
          schema:
            type: string
            title: Problem Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatProblemSubmitRequestBody'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatProblemSubmitResponse'
        '400':
          description: 이미 정답/복습 처리된 문제에 답안을 다시 제출할 때 반환됩니다.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /problems/{problem_id}:
    get:
      tags:
        - problems
      summary: Get Problem
      description: problem_id에 해당하는 문제 정보를 반환합니다.
      operationId: get_problem_problems__problem_id__get
      parameters:
        - name: problem_id
          in: path
          required: true
          schema:
            type: string
            title: Problem Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemResponse'
        '404':
          description: 해당 문제가 존재하지 않을 경우 반환됩니다.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /problems:
    post:
      tags:
        - problems
      summary: Create Problems
      description: 문제 생성 API 입니다.
      operationId: create_problems_problems_post
      parameters:
        - name: x-api-key
          in: header
          required: false
          schema:
            anyOf:
              - type: string
              - type: 'null'
            title: X-Api-Key
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProblemCreateRequestBody'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemCreateResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /uploads:
    post:
      tags:
        - upload
      summary: Create Upload Url
      description: 파일 업로드 위한 url을 반환합니다.
      operationId: create_upload_url_uploads_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UploadUrlRequest'
        required: true
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadUrlResponse'
        '400':
          description: 지원하지 않는 mime type 요청 시 반환됩니다.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /uploads/{key}:
    put:
      tags:
        - upload
      summary: Upload File
      operationId: upload_file_uploads__key__put
      parameters:
        - name: key
          in: path
          required: true
          schema:
            type: string
            title: Key
        - name: expires
          in: query
          required: true
          schema:
            type: integer
            title: Expires
        - name: signature
          in: query
          required: true
          schema:
            type: string
            title: Signature
        - name: mime
          in: query
          required: true
          schema:
            type: string
            title: Mime
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /users:
    get:
      tags:
        - users
      summary: Get Users
      description: 전체 사용자 목록 조회
      operationId: get_users_users_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/UserResponse'
                type: array
                title: Response Get Users Users Get
      x-staleTime: Infinity
      x-gcTime: Infinity 
    post:
      tags:
        - users
      summary: Create User
      description: 신규 사용자 생성
      operationId: create_user_users_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCreateRequestBody'
        required: true
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserCreateResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /users/{user_id}:
    get:
      tags:
        - users
      summary: Get User
      description: 특정 사용자 정보 조회
      operationId: get_user_users__user_id__get
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
            title: User Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '404':
          description: 사용자를 찾을 수 없는 경우
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      x-staleTime: Infinity
      x-gcTime: Infinity
    patch:
      tags:
        - users
      summary: Patch User
      description: 유저 정보를 수정합니다.
      operationId: patch_user_users__user_id__patch
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
            title: User Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdateRequestBody'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserUpdateResponse'
        '404':
          description: 사용자를 찾을 수 없는 경우
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
        - users
      summary: Delete User
      description: 특정 사용자 삭제
      operationId: delete_user_users__user_id__delete
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
            title: User Id
      responses:
        '204':
          description: Successful Response
        '404':
          description: 사용자를 찾을 수 없는 경우
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /users/{user_id}/unknown-concepts:
    get:
      x-ignore: true
      tags:
        - users
      summary: Get Unknown Concepts List
      description: 사용자의 이해하지 못한 개념 목록 조회
      operationId: get_unknown_concepts_list_users__user_id__unknown_concepts_get
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
            title: User Id
        - name: subject
          in: query
          required: false
          schema:
            anyOf:
              - type: string
              - type: 'null'
            title: Subject
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UnknownConceptResponse'
                title: >-
                  Response Get Unknown Concepts List Users  User Id  Unknown
                  Concepts Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    put:
      x-ignore: true
      tags:
        - users
      summary: Upsert Unknown Concept
      description: 사용자의 이해하지 못한 개념 생성 또는 갱신
      operationId: upsert_unknown_concept_users__user_id__unknown_concepts_put
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
            title: User Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UnknownConceptCreateRequestBody'
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnknownConceptResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      x-ignore: true
      tags:
        - users
      summary: Delete Unknown Concept
      description: 사용자의 이해하지 못한 개념 삭제
      operationId: delete_unknown_concept_users__user_id__unknown_concepts_delete
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
            title: User Id
        - name: subject
          in: query
          required: false
          schema:
            anyOf:
              - type: string
              - type: 'null'
            title: Subject
        - name: key_concept
          in: query
          required: false
          schema:
            anyOf:
              - type: string
              - type: 'null'
            title: Key Concept
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
