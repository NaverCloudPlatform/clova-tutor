  /problem-bookmarks:
    get:
      tags:
        - problem-bookmarks
      summary: Get Problem Bookmarks
      description: 사용자가 등록한 문제 학습 노트 리스트 조회
      operationId: get_problem_bookmarks_problem_bookmarks_get
      parameters:
        - name: subject
