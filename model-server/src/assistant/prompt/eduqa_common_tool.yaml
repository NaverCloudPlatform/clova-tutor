problem_info_tool:
  description: |
    <대화>를 참고하여, 사용자의 마지막 발화(요청이 하나뿐이라면 그 발화)가 새로운 학습 문제·개념·주제·단어·문장·유형 등을 제시하거나, ‘뜻 알려줘’, ‘설명해줘’, ‘이건 뭐야?’ 등 학습과 관련된 설명을 요구하는 경우에 호출하세요.
make_problem_summary_tool:
  description: |
    <대화>를 보고, 현재 학습 주제가 끝났을 때 호출하세요. 예를 들어, 사용자가 **"다 이해했어!", "다음 문제 풀어볼래", 등으로 대화를 마무리하거나 다음 문제로 넘어가려 할 때** 호출하세요.
    **절대 호출하지 말 것**: 
    - "문제 같이 풀어주세요" 같은 해설 요청 시에는 절대 호출하지 마세요.
persuasion_tool:
  description: |
    <대화>를 기반으로, 사용자가 **현재 학습 주제(개념/단원)**에서 벗어나 **새로운 학습 주제를 명확하게 제시할 때**만 호출합니다. 예를 들어, 사용자가 '일차방정식'에 대해 질의한 뒤 '이차방정식'으로 질문을 바꾼다면, 이는 학습 주제가 전환된 상황입니다. 단, 동일한 학습 주제에서 다른 질의를 할 때는 해당되지 않습니다.   
    **절대 호출하지 말 것**:
    - 더 어려운 문제, 다른 문제, 비슷한 문제 요청
    - 문제 추천 요청
    - 같은 대단원 내 세부 개념 이동
    - 이전 주제로 다시 돌아가는 경우
    - 단순 개념 설명/정의/정리 요청
    **호출 가능 조건 (명시적 Topic Shift)**:
    - "이제 다른거 공부할래"
    - "수학 말고 영어로 할래"