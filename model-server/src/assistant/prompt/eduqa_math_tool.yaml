detect_unknown_concept_math_tool:
  description: |
    - **역할**
      - 수학 개념에 대한 이해 부족이나 혼란 신호가 보이면 호출하세요.
concept_note_tool:
  description: |
    - **역할**
      - 수학 개념의 정의, 성질, 조건, 공식, 개념적 의미 등을 설명하는 도구
      - 문제 풀이와 무관한 개념 설명만 제공
      - LaTeX 포함 가능
stepwise_solution_tool:
  description: |
    - **역할**
      - 문제를 사용자가 직접 풀려고 할 때 사용하는 도구
      - 정답 제공하지 않고 풀이 방향, 힌트, 단계별 가이드만 제공
      - 학생이 스스로 풀 수 있도록 도와주는 도구
recommend_problem_tool:
  description: |
    - **역할**
      - 사용자가 문제에 대한 정답을 맞추거나 새로운 문제 추천 혹은 생성을 원할 경우 호출
      - 학생이 정답을 맞춘 경우 다음 문제를 추천할 때 호출
      - 학생이 학습 내용 정리 요청을 할 때 호출
      - 현재 문제에 대한 풀이/해설/답 요청 지시어가 등장하면 절대 호출 불가
      - 오답 교정/정답 검증 요청 시 절대 호출 불가
  Args:
    correct_answer:
      description: |
        학생이 문제에 대한 답을 정확히 맞췄는지 여부를 판단합니다.  
        ## True로 설정하는 경우 (정답을 맞춰서 칭찬 피드백이 필요)
        - 객관적으로 검증 가능하고 정답인 경우 (예: 단어 뜻, 문법 개념 등)
        - "정답이야", "맞췄어", "맞았어", "풀었다", "해결했어" 등 강한 정답 확신 표현이 있는 경우
        - 문제 해결 완료 신호가 명확한 경우
        ## False로 설정하는 경우 (단순 추천 요청 또는 오답/불확실)
        - 단순히 "문제 추천해줘", "다음 문제", "새 문제" 등만 요청
        - 명백한 오답을 제시한 경우
        - 답을 제시하지 않고 질문만 하는 경우
        - 불확실한 답변 ("~인 것 같아", "아마도", "잘 모르겠는데")
        - 학습 과정 중 힌트를 요청하거나 설명을 듣는 경우
    more_difficult:
      description: |
        난이도 상향 여부를 판단합니다.
        ## True로 설정하는 경우 (난이도 상향 요청)
        - "더 어려운", "심화", "도전적인", "레벨업", "난이도 높은" 등 명시적 상향 요청
        - "쉬워", "너무 쉽다" 등 현재 난이도가 낮다는 표현과 함께 다음 문제 요청
        - "더 복잡한", "어려운 걸로 추천해줘", "더 어려운 문제 추천해줘" 등의 표현
        ## False로 설정하는 경우 (난이도 유지 또는 언급 없음)
        - 난이도 언급이 전혀 없는 경우
        - "비슷한", "같은 수준", "이런 문제", "다른 문제" 등 동일 수준 요청
        - "쉬운", "쉬운 걸로", "기초" 등 난이도 하향 요청
default_chat_tool:
  description: |
    - **역할**
      - 수학 학습(수학 문제, 풀이, 개념 등)과 무관한 **일반 대화**를 처리하는 도구
      - 잡담, 일상 대화, 날씨/시사/음식/취미 등 비학습 주제 처리
      - 수학 외 다른 과목/완전히 다른 주제의 질문 처리
