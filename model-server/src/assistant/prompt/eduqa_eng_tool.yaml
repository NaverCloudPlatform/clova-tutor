translation_tool:
  description: |
    - **역할**
      - 영어 문장/지문에 대한 **해석, 직독직해, 문장 구조 설명**을 제공하는 도구
      - 문장의 의미와 구조를 분석하여 한국어로 번역하거나 설명
      - 새로운 문제를 생성하거나 추천하지 않음

  Args:
    text:
      description: |
        사용자의 발화에서 **해석/직독직해가 필요한 영어 문장(text)** 만을 추출합니다.
        - 하나의 연속된 영어 문장/지문만 넘기도록 합니다.
        - 한국어 설명, 부가 문장은 모두 제거하고 영어 텍스트만 남깁니다.

table_fetch_tool:
  description: |
    - **역할**
      - 영어 **단어 의미, 발음, 유의어/반의어, 어원, 변화형, 관용구, 파생어**를 조회하는 도구
      - 영어 **문법 항목/문법 개념/문법 비교**에 대한 정보를 조회하는 도구
      - DB에 있는 단어/문법 테이블에서 정보를 가져와 제공
      - 새로운 문제를 생성하거나 추천하지 않음

  Args:
    voca:
      description: |
        단어별로 조회할 **추가 정보 항목**을 지정합니다.  
        key는 단어 문자열, value는 조회할 항목 인덱스 리스트입니다.

        - 입력 예시:
          ex 1)
          input: user: "between의 유의어, 반의어와 even의 변화형 알려줘."
          output: {"between": [1, 2], "even": [4]}

          ex 2)
          input: user: "apple의 뜻 알려줘."
          output: {"apple": [0]}

        - 선택 항목:
          0: 기본 정보 (뜻, 발음)
          1: 유의어
          2: 반의어
          3: 어원
          4: 변화형
          5: 관용구
          6: 파생어

    grammar:
      description: |
        조회할 문법 항목 목록을 작성합니다. **95개 문법 세부주제 목록** 중 관련 있는 항목을 모두 선택합니다. 

        ## 95개 문법 세부주제 목록:
        {grammar_topic}

        - 입력 예시:
          ex 1)
          input: user: "to 부정사와 동명사의 차이를 알려줘"
          output: ["to부정사", "동명사"]

          ex 2)
          input: user: "to 부정사의 부사적 용법에 대한 개념을 설명해줘"
          output: ["to부정사"]

answer_included_tool:
  description: |
    - **역할**
      - 현재 대화에서 이미 제시된 **영어 문제(지문 + 보기 등)에 대해 정답, 풀이, 해설을 제공**하는 도구
      - 현재 문제의 정답이 무엇인지, 왜 그 선택지가 답인지, 해석/문법 포인트를 포함한 해설을 제공
      - 학생이 제시한 답에 대한 평가 및 오답 교정 제공
      - 새로운 문제 생성·추천 절대 금지
      - 학생이 오답을 말한 경우에는 반드시 이 도구를 호출

recommend_problem_tool:
  description: |
    - **역할**
      - 학생이 **새로운 영어 문제 추천 혹은 생성을 요청**할 때 호출
      - 학생이 **정답을 맞춘 경우** 다음 문제를 추천할 때 호출
      - 학생이 **학습 내용 정리 요청**을 할 때 호출
      - 현재 문제를 잘 풀어서 **다음 문제로 넘어가고 싶어할 때** 호출
      - 현재 문제에 대한 풀이/해설/답 요청 지시어가 등장하면 절대 호출 불가
      - 오답 교정/정답 검증 요청 시 절대 호출 불가

  Args:
    correct_answer:
      description: |
        학생이 **직전 문제에서 정답을 맞췄는지 여부**를 판단합니다.

        ## True로 설정하는 경우 (정답을 맞춰서 칭찬/다음 문제 피드백이 적절한 경우)
        - 객관적으로 정답이라고 판단되는 답을 제출한 뒤
          "맞았어", "정답이야", "풀었다", "해결했어" 등 강한 확신 표현이 있는 경우
        - 시스템이나 맥락상 그 답이 정답인 것이 분명한 경우
        - 문제 해결 완료 신호가 명확한 경우
        - 이 상태에서 "다음 문제", "다른 문제" 등을 요청

        ## False로 설정하는 경우 (단순 추천 요청 또는 오답/불확실)
        - "문제 추천해줘", "다음 문제", "새 문제" 등만 요청 (정답 여부 언급 없음)
        - 명백한 오답을 제시한 경우
        - 답을 제시하지 않고 "문제 풀래" 등만 말한 경우
        - "~인 것 같아", "아마도" 등 불확실한 표현이 섞인 경우
        - 학습 과정 중 힌트나 설명만 요청하는 경우

    more_difficult:
      description: |
        다음 문제의 난이도를 상향해야 하는지 여부를 판단합니다.

        ## True로 설정하는 경우 (난이도 상향 요청)
        - "더 어려운", "심화", "도전적인", "레벨업", "난이도 높은" 등 명시적인 상향 요청
        - "쉬워", "너무 쉽다" 등 현재 난이도가 낮다는 표현 + 다음 문제 요청
        - "더 복잡한 문제 추천해줘", "어려운 걸로 추천해줘", "더 어려운 문제 추천해줘" 등

        ## False로 설정하는 경우 (난이도 유지 또는 언급 없음)
        - 난이도 관련 언급이 전혀 없는 경우
        - "비슷한", "같은 수준", "이런 문제", "다른 문제" 등 동일 수준 요청
        - "쉬운 문제", "기초 문제", "쉬운 걸로" 등 난이도 하향 요청

default_chat_tool:
  description: |
    - **역할**
      - 영어 학습(영어 문제, 단어/문법, 해석 등)과 무관한 **일반 대화**를 처리하는 도구
      - 잡담, 일상 대화, 날씨/시사/음식/취미 등 비학습 주제 처리
      - 영어 외 다른 과목/완전히 다른 주제의 질문 처리
