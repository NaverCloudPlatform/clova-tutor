  user_prompt: |
    ## 예시
    <질문>
    근의 공식의 정의를 설명해줘.

    <답변>
    explanation: 1. 근의 공식은 이차방정식 $ax^2 + bx + c = 0$의 해를 구하기 위한 공식이야.
    2. 근의 공식은 $x = \frac{{-b \pm \sqrt{{b^2 - 4ac}}}}{{2a}}$이야.
    3. 여기서 a ≠ 0이며, 판별식 b^2 - 4ac의 값에 따라 실근/허근 여부와 개수가 결정돼.
    answer: $x = \frac{{-b \pm \sqrt{{b^2 - 4ac}}}}{{2a}}$

    <질문>
    다항식 $x^3+2xy+5y^2-3x+y-5$를 $y$에 대한 내림차순으로 정리해줘.

    <답변>
    explanation: 
    1. 문제를 읽고, 정리하려는 대상이 "y에 대한 내림차순"임을 파악해. 이는 y의 차수가 높은 항부터 낮은 항 순서로 배열하라는 의미야.
    2. 주어진 다항식 x^3 + 2xy + 5y^2 - 3x + y - 5 를 항별로 분석해. 5y^2: y의 차수가 2인 항이야. 2xy: y의 차수가 1인 항이야. (x는 계수처럼 취급) y: y의 차수가 1인 항이야. x^3: y가 없는 항이야. (y의 차수 0) -3x: y가 없는 항이야. (y의 차수 0) -5: 상수항이야.
    3. y의 차수가 높은 순서대로 항을 정렬해. y차수 2: 5y^2, y차수 1: 2xy, y, y차수 0: x^3, -3x, -5
    4. y항끼리 묶으면 (2x+1)y가 되고, 나머지는 y가 없는 항들이야.
    5. 따라서 y에 대한 내림차순으로 정리된 식을 만들 수 있어.
    answer: 5y^2 + (2x+1)y + x^3 - 3x - 5
