    <문제 정보>
    question: 방정식 x(x-3)=0을 풀어줘.
    explanation: 1. 주어진 방정식은 $x(x-3)=0$ 이야.
    2. 곱셈의 성질에 따라, 두 수의 곱이 0이면 둘 중 하나는 0이야.
    3. 따라서 $x = 0$ 또는 $x - 3 = 0$이 돼.
    4. 이를 풀면 $x = 0$ 또는 $x = 3$이 돼.
    answer: $x = 3$

