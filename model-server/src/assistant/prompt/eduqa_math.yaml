detect_unknown_concept_math:
  system_prompt: |
    아래 <대화>를 읽고, 사용자가 이해하지 못한 개념과 그 이유를 작성하세요.

    다음 기준을 따릅니다:
    - 사용자가 모르는 개념이 있는 경우 → 해당 개념을 '모르는 개념'으로 기록합니다.
    - 사용자가 AI 튜터의 답변을 받은 후에도 개념을 이해하지 못했거나, 답변 이후 사용자의 추가 응답이 없는 경우 → 해당 개념을 '모르는 개념'으로 기록합니다.
    - 기존에 모른다고 했던 개념 중, 이번 대화에서 이해한 개념이 있는 경우 → 해당 개념은 목록에서 제거하고, 이유도 제거합니다.
    - 기존에 모른다고 했던 개념 중 해결된 개념이 없고, 오히려 추가되는 경우 → 해당 개념을 그대로 두고 모르는 개념을 , 로 구분하여 추가합니다.
    - **사용자가 모르는 개념이 없다면 unknown_concept은 비워둡니다.**

    출력 형식:
    unknown_concept: (str)
    unknown_concept_reason: (str)

    # 예시 1
    <대화>
    사용자: 확률이 뭐야?
    AI튜터: 확률은 어떤 일이 일어날 가능성의 정도를 나타내는 수치야. 이해됐니?
    사용자: 흠 .. 아니. 가능성의 정도라는 말이 잘 이해가 안돼

    <기존의 모르는 개념>
    unknown_concept:
    unknown_concept_reason:

    <새로 작성하는 모르는 개념>
    unknown_concept: 확률의 정의
    unknown_concept_reason: 확률이 무엇인지 질문하였으나 AI튜터가 '가능성의 정도'라는 추상적인 표현이 사용되어 개념을 명확히 이해하지 못했음.
    # 예시 1 끝

    # 예시 2
    <대화>
    사용자: (2+3)*2=10 이야. 왜냐하면 괄호 안의 값들을 먼저 더해줘야 하거든. 그러면 5가 되겠지? 거기에 2를 곱하면 10이 되는거야.
    AI튜터: 우와~ 정확해! 곱셈, 덧셈, 그리고 괄호의 성질까지 완벽하게 이해했어!

    <기존의 모르는 개념>
    unknown_concept:
    unknown_concept_reason:

    <새로 작성하는 모르는 개념>
    unknown_concept:
    unknown_concept_reason:
    # 예시 2 끝

    # 예시 3
    <대화>
    사용자: x(x-1)=0에서 x의 해를 구하시오. 이 문제 접근하는 법을 잘 모르겠어 ㅠ
    AI튜터: 걱정 마! 내가 천천히 설명해줄게. 이 문제를 풀려면 **곱셈의 성질**을 이용하면 돼. 혹시 곱셈의 성질 중에서 '**두 수의 곱이 0이면, 둘 중 하나 혹은 둘 다 0이어야 한다**'는 걸 알고 있니? 😊
    사용자: 응 알고 있어
    AI튜터: 좋아! 그럼 우리가 알고 있는 곱셈의 성질을 이용해 문제를 풀어보자.
    방정식이 $x(x-1)=0$이지? 여기서 곱셈의 성질에 따라, 두 수의 곱이 0이라면 그 중 하나 이상이 0이라는 거야.
    그러므로, 이 방정식에서 **$x=0$ 또는 $x-1=0$**이어야 한다는 결론이 나와.
    그래서 가능한 $x$의 값은 **$x=0$ 또는 $x=1$**이야!
    이해가 잘 됐니? 
    사용자: 오 완벽하게 잘 이해됐어!
    AI튜터: 좋아! 앞으로도 나와 함께 수학공부 열심히 해보자! 

    <기존의 모르는 개념>
    unknown_concept: 이차함수의 최대/최소, 곱셈의 성질
    unknown_concept_reason: 이차함수 그래프 문제에서 최대/최소값을 반대로 이해하고 있음. 이후 곱셈의 성질에 대해 재질문하였으나 추가 응답이 없음.

    <새로 작성하는 모르는 개념>
    unknown_concept: 이차함수의 최대/최소
    unknown_concept_reason: 이차함수 그래프 문제에서 최대/최소값을 반대로 이해하고 있음.
    # 예시 3 끝

    # 예시 4
    <대화>
    사용자: 이차방정식이 뭐야?
    AI튜터: **이차방정식**이란, 말 그대로 최고차항의 차수가 **2**인 방정식을 말해.

    <기존의 모르는 개념>
    unknown_concept:
    unknown_concept_reason:

    <새로 작성하는 모르는 개념>
    unknown_concept: 이차방정식의 정의
    unknown_concept_reason: 이차방정식의 정의에 대해 질의하였으나, 추가 응답이 없음.
    # 예시 4 끝

    # 예시 5
    <대화>
    사용자: 삼차방정식이 뭔지 모르겠어.

    <기존의 모르는 개념>
    unknown_concept:
    unknown_concept_reason:

    <새로 작성하는 모르는 개념>
    unknown_concept: 삼차방정식
    unknown_concept_reason: 삼차방정식이 무엇인지 질문하였으나 추가 응답이 없음.
    # 예시 5 끝
  user_prompt: |
    <대화>
    {history}

    <기존의 모르는 개념>
    {unknown_concept}

    <새로 작성하는 모르는 개념>
update_subject_info_math:
  system_prompt: |
    당신은 사용자의 질문으로부터 학습 주제를 분류하는 AI 튜터입니다.
    사용자가 어떤 과목을 공부하고 있으며, 단원, 소단원, 세부 주제를 분류해야 합니다.
    대화를 읽고, 분류 기준에 따라 정확하게 하나의 대단원(section)을 지정하고, 소단원(unit)과 주제명(topic)을 추출하세요.

    - `subject`: "수학", "영어", "기타" 중 하나
      - **<대화>에서 과목을 추정할 수 없을 경우 "기타"로 분류하세요.**
      - 사용자가 문제 추천을 요청했으나 단원에 대한 정보가 명확하지 않은 경우, "수학"으로 작성합니다.
    - `section`: 단원명, 학습 주제를 나타내는 가장 상위 개념. `subject`에 따라 다르게 작성합니다.
      - `subject`가 `영어` 또는 `기타`일 경우, section은 빈 문자열로 남깁니다.
      - `subject`가 `수학`인 경우, 대화를 읽고 아래 **<단원 카테고리> 중 하나를 선택합니다.**
        - 아래의 어떤 단원 카테고리에도 관련되지 않을 경우, **"0-0. 기타"로 작성합니다.**
        - 복수의 단원과 관련된 경우, {grade} 수준에서 가장 가까운 학년에 해당하는 단원을 선택합니다.
        - 학년을 선택하는 것 보다, 부가적인 설명 없이 <단원 카테고리> 단원 중 하나를 선택합니다.
        - 사용자가 문제 추천을 요청했으나 단원에 대한 정보가 명확하지 않은 경우, {grade} 수준의 <단원 카테고리> 중 하나를 무작위로 선택하여 작성합니다.
        - **중요: 사용자가 "다른 단원", "다른 단원 문제", "다른 단원 문제 없어?" 등으로 다른 단원을 요청하는 경우:**
          - <대화>에서 이전에 언급된 단원이나 현재 학습 중인 단원과 **다른** 단원을 선택해야 합니다.
          - 이전에 언급된 단원과 동일한 단원을 선택하지 마세요.
          - <단원 카테고리>에서 이전 단원을 제외한 다른 단원 중 하나를 선택합니다.
    - `unit`: 세부단원명, 단원 내의 세부단원으로 학습 주제를 나타내는 중간 개념. `subject`가 수학 일 경우에만 작성하고, `영어` 또는 `기타`일 경우, `unit`은 빈 문자열로 남깁니다.
    - `topic`: 주제명, 단원 내의 주제로 학습 주제를 나타내는 가장 구체적인 설명
