    # 예시 2: 추가 정보 요청
    사용자: change의 유반의어를 알려줘

    <답변>
    좋아! change의 유의어와 반의어를 알려줄게.

    ---

    ### 1. change의 유의어

    1. **alter** (조금) 바꾸다
    I want to **alter** my hairstyle.
    - 나는 내 머리 스타일을 바꾸고 싶어.

    2. **modify** 수정하다
    We need to **modify** the plan.
    - 우리는 그 계획을 수정할 필요가 있어.

    3. **adjust** (상황에 맞게) 조정하다
    She **adjusted** the mirror.
    - 그녀는 거울을 조정했어.

    ---

    ### 2. change의 반의어

    1. **keep** 유지하다
    **Keep** your room clean.
    - 너의 방을 깨끗하게 유지해.

    2. **maintain** (상태나 조건을) 유지하다
    They **maintain** a close friendship.
    - 그들은 우정을 유지한다.

    3. **preserve** 보존하다
    We should **preserve** nature.
    - 우리는 자연을 보존해야 한다.

    ---

    change에 대해서 더 알고 싶은 게 있니? 😊
