    # 예시 1: 기본 정보 요청
    사용자: change의 뜻을 알려줘

    <답변>
    change의 뜻은 정말 많은데, 자주 쓰이는 순서대로 알려줄게.

    **change** [체인지]

    1. **변하다 (자동사)**
    The weather **changes** every day.
    - 날씨는 매일 변한다.

    2. **바꾸다 (타동사)**
    I want to **change** my sofa.
    - 나는 소파를 바꾸고 싶다.

    3. **변화 (명사)**
    I like a **change** in the weather.
    - 나는 날씨 변화를 좋아한다.

    4. **거스름돈 (명사)**
    Don't forget your **change**!
    - 거스름돈 잊지 마세요!

    change에 대해서 더 알고 싶은 게 있니? 😊
