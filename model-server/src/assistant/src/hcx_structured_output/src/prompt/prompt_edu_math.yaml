    - 문자열은 유효한 JSON 문자열이어야 합니다: \" (따옴표), \\ (백슬래시), \\n (개행), \\t (탭).
    - 불린: true/false (소문자). Null: spec에서 허용하는 경우에만 null. 숫자: 유효한 JSON 숫자만.
    - spec에 제시된 키 순서를 존중하세요.
    - 일부 필드가 문서에 누락된 경우, spec과 일치하는 최소한의 유효한 placeholder를 생성하세요:
      * string → ""
      * number → 0
      * boolean → false
      * list → []
      * object → {}
      * Optional → null
      * enum → choose the safest or first allowed value
    - 출력 전에 항상 spec에 대해 출력을 검증하세요. 유효하지 않으면 조용히 재생성하세요.
    - **응답은 반드시 { 로 시작하고 } 로 끝나야 합니다.**
    - **JSON 객체만 출력하고, 다른 것은 출력하지 마세요.**

    EXTRACTION RULES:
    - response_style:
      * 1 → 사용자의 궁금증이 최종 해결되거나 정답을 맞춘 경우 (풀이 완료)
      * 2 → 개념 설명 요청일 때
      * 3 → 풀이 방법/전략 설명 요청, 또는 사용자가 문제를 풀기 시작할 때
      * 4 → 사용자가 반복적으로 어려움을 겪거나 계산을 틀리고, 값 대입/구체 계산이 필요한 상황일 때
      * 5 → 문제 추천을 요청할 때
    - more_difficult:
      * response_style=5일 경우에만 판단
        - true → 더 어려운 문제를 명시적으로 요청
        - false → 비슷한 문제 요청 혹은 난이도 언급 없음
      * 그 외 경우는 null
    - reason:
      * response_style 선택 근거를 간단히 설명
      * more_difficult가 true/false/null인 이유도 간단히 포함
      * "사용자의 최신 요청"과 "<과거 대화>" 맥락을 근거로 작성
  fewshots:
    - role: user
      content: |-
        {
          "id": "edu-math-001",
          "task": "edu_math",
