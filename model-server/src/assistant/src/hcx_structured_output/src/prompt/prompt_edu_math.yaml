    - 문자열은 유효한 JSON 문자열이어야 합니다: \" (따옴표), \\ (백슬래시), \\n (개행), \\t (탭).
    - 불린: true/false (소문자). Null: spec에서 허용하는 경우에만 null. 숫자: 유효한 JSON 숫자만.
    - spec에 제시된 키 순서를 존중하세요.
    - 일부 필드가 문서에 누락된 경우, spec과 일치하는 최소한의 유효한 placeholder를 생성하세요:
      * string → ""
      * number → 0
      * boolean → false
      * list → []
      * object → {}
      * Optional → null
      * enum → choose the safest or first allowed value
    - 출력 전에 항상 spec에 대해 출력을 검증하세요. 유효하지 않으면 조용히 재생성하세요.
    - **응답은 반드시 { 로 시작하고 } 로 끝나야 합니다.**
    - **JSON 객체만 출력하고, 다른 것은 출력하지 마세요.**

    EXTRACTION RULES:
    - `explanation`
      * step by step 추론을 dict 형태로 제공하세요.
      * key는 string 형태의 num 입니다 ("1","2","3",...).
      * value는 step-by-step의 한국어 설명입니다 (필요한 경우에만 영어 사용).
      * `explanation.text`는 항상 dictionary 형태여야 합니다. (e.g., {"1": "Explanation 1", "2": "Explanation 2"})
    - `answer`
      * 최종 답변을 간결한 string 형태로 제공하세요.
      * `answer.text`는 항상 string 형태여야 합니다.
  fewshots:
    - role: user
      content: |-
        {
          "id": "edu-math-001",
          "task": "edu_math",
          "spec": {
            "explanation": { "text": "dict" },
            "answer": { "text": "str" }
          },
          "document": "삼각형 3개의 각의 합은 몇이야?"
        }
    - role: assistant
      content: |-
        {"explanation": {"text": {"1": "삼각형은 세 개의 변으로 이루어진 도형이고, 세 개의 꼭짓점을 가지고 있어.", "2": "삼각형의 세 각은 바로 이 세 꼭짓점에서 만나는 각들이야.", "3": "삼각형의 세 각의 크기의 합을 구하려면 한 꼭짓점을 기준으로 생각해보면 돼.", "4":"한 꼭짓점에서 만나는 두 개의 각을 더하면 180도가 되는데, 이게 삼각형의 세 각의 합이야.", "5":"따라서 삼각형의 세 각의 합은 항상 180도야."}},"answer": { "text": "180도"}}

    - role: user
      content: |-
        {
          "id": "edu-math-002",
          "task": "edu_math",
          "spec": {
            "explanation": { "text": "dict" },
            "answer": { "text": "str" }
          },
          "document": "피타고라스 정리에 대해 알고싶어"
        }
    - role: assistant
      content: |-
        {"explanation": {"text": {"1": "피타고라스 정리는 직각삼각형에서 성립하는 중요한 정리야.", "2": "직각삼각형에서 빗변의 제곱은 나머지 두 변의 길이의 제곱의 합과 같아. 이걸 식으로 나타내면 $c^{2}=a^{2}+b^{2}$이야. 여기서 c는 빗변의 길이이고, a와 b는 다른 두 변의 길이야.", "3": "이 정리는 주로 직각삼각형의 세 변의 길이 사이 관계를 확인하는데 사용돼. 예를 들면, 만약 두 변의 길이를 알면 피타고라스 정리를 이용해 남은 한 변의 길이를 계산할 수 있어.", "4": "또한, 피타고라스 정리는 다양한 수학 문제를 해결하거나 도형의 성질을 증명하는 데에도 유용하게 쓰여."}},"answer": { "text": "피타고라스 정리는 직각삼각형에서 빗변의 제곱이 나머지 두 변의 제곱의 합과 같다는 내용의 정리입니다. 즉, $c^{2}=a^{2}+b^{2}$ 입니다."}}

update_response_info_math:
  system_rules: |-
    당신은 엄격한 JSON 생성기입니다.  

    CORE RULES:
    - **반드시 JSON 형식으로만 응답하세요. 다른 형식은 절대 사용하지 마세요.**
