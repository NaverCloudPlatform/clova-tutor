    - 4: 문제 해설 및 정답 제공
    - 5: 문제 추천 (동일 개념/형식, 난이도 요청 포함)
    - 6: 풀이 완료 후 마무리 응답

    RESPONSE_STYLE_VOCA_ADDITIONAL:
    - 작성 조건: response_style=1일 때만 작성, 나머지는 null
    - dict 형식: {"단어명": [번호,...], ...}
    - 번호 의미:
      1: 유의어
      2: 반의어
      3: 어원
      4: 변화형
      5: 관용구
      6: 파생어
    - 여러 단어 요청 시 key-value pair로 분리
    - 요청되지 않은 정보는 생략

    MORE_DIFFICULT:
    - response_style=5일 때만 true/false 선택
      * true: 더 어려운 문제 요청
      * false: 비슷한 난이도의 문제 요청 (난이도 언급 없음 포함)
    - 그 외는 null

    REASON:
    - 각 항목(response_style, response_style_voca_additional, more_difficult)에 대해 선택 이유를 간결하게 작성
    - 반드시 한국어로 작성
